<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>통변역 툴 · 구글밋 인터뷰</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>통변역 툴</h1>
      <p class="subtitle">한/영 → 중국어 음성 · 중국어 → 한/영 텍스트</p>
    </header>

    <section class="controls">
      <div class="control-group">
        <label for="micSelect">🎙️ 인터뷰어 마이크 (한/영 입력)</label>
        <select id="micSelect"></select>
      </div>

      <div class="control-group">
        <label for="outputSelect">🔊 중국어 TTS 출력 장치 (→ BlackHole)</label>
        <select id="outputSelect"></select>
      </div>

      <div class="control-actions">
        <button id="interviewerBtn" class="btn btn-primary">▶ 인터뷰어 마이크 시작</button>
        <button id="intervieweeBtn" class="btn btn-primary">▶ 인터뷰이 캡처 시작 (밋 탭 공유)</button>
      </div>

      <div class="options">
        <label class="checkbox">
          <input type="checkbox" id="monitorTTS" />
          중국어 음성 여기서도 듣기(모니터)
        </label>
      </div>
    </section>

    <main class="panels">
      <!-- 인터뷰어 -->
      <div class="panel panel-interviewer">
        <div class="panel-head">
          <span class="dot" id="interviewerDot"></span>
          <h2>인터뷰어 → 중국어 음성 🔈</h2>
        </div>
        <div class="interim" id="interviewerInterim"></div>
        <div class="log" id="interviewerLog"></div>
      </div>

      <!-- 인터뷰이 -->
      <div class="panel panel-interviewee">
        <div class="panel-head">
          <span class="dot" id="intervieweeDot"></span>
          <h2>인터뷰이 (중국어) → 한/영 텍스트 🔇</h2>
        </div>
        <div class="interim" id="intervieweeInterim"></div>
        <div class="log" id="intervieweeLog"></div>
      </div>
    </main>

    <footer class="statusbar">
      <span id="status">대기 중</span>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
